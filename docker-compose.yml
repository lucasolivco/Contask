services:
  # ✅ BACKEND DEV
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3001
    env_file:
      - ./env/.env.local
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./uploads:/app/uploads
      - /app/node_modules
    networks:
      - dev-network
    depends_on:
      postgres-dev:
        condition: service_healthy
    command: npm run dev

  # ✅ FRONTEND DEV (Vite dev server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    networks:
      - dev-network
    command: npm run dev

  # ✅ POSTGRES DEV (dados não persistentes)
  postgres-dev:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=dev_password_123
      - POSTGRES_DB=taskorganizer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskorganizer_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ✅ REDIS DEV
  redis-dev:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass dev_redis_123
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data: