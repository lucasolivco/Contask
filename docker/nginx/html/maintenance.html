<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Sistema Indisponível | Canella & Santos</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            background-color: #101018;
            background-image: radial-gradient(circle at 100% 0%, rgba(231, 81, 114, 0.2) 0%, transparent 40%),
                              radial-gradient(circle at 0% 100%, rgba(30, 203, 225, 0.2) 0%, transparent 40%);
        }
        .container {
            text-align: center;
            padding: 3rem;
            max-width: 500px;
            background: rgba(29, 29, 41, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .icon { font-size: 3.5rem; margin-bottom: 1.5rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.75rem; }
        p { color: #c0c0d0; font-size: 1rem; line-height: 1.6; margin-bottom: 0.5rem; }
        .retry-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #1ECBE1;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid rgba(30, 203, 225, 0.4);
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .retry-link:hover { background-color: rgba(30, 203, 225, 0.15); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #1ECBE1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1.5s linear infinite; margin: 1.5rem auto 0; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#9888;&#65039;</div>
        <h1>Sistema Temporariamente Indisponível</h1>
        <p>O serviço de autenticação está em manutenção ou sendo inicializado.</p>
        <p>Tente novamente em alguns instantes.</p>
        <div class="spinner"></div>
        <a href="/" class="retry-link">Tentar novamente</a>
    </div>
</body>
</html>
