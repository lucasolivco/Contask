# ============================================
# FISCOPREV - HUB DE PENDÊNCIAS FISCAIS
# ============================================
# Arquivo: fiscoprev.conf
# Local VPS: /caminho/do/contask/docker/nginx/conf.d/fiscoprev.conf

# Upstream para o frontend (Nginx interno que proxia /api ao backend)
upstream fiscoprev_frontend {
    server hub_pendencias_frontend:80 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ============================================
# SERVIDOR HTTPS
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fiscoprev.canellahub.com.br;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/fiscoprev.canellahub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fiscoprev.canellahub.com.br/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upload size (Excel files)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/fiscoprev_access.log;
    error_log /var/log/nginx/fiscoprev_error.log warn;

    # ============================================
    # HEADERS DE SEGURANÇA
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # SSO: Validação de Sessão via CanellaHub
    # ============================================
    location = /_validate_session {
        internal;
        proxy_pass http://task_manager_backend:3001/api/auth/validate-session;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location @login_redirect {
        return 302 https://canellahub.com.br?redirect=$scheme://$host$request_uri;
    }

    # Página de manutenção quando o backend de autenticação está fora do ar
    error_page 502 503 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ============================================
    # TUDO VAI PARA O FRONTEND (que faz proxy do /api internamente) — Protegido por SSO
    # ============================================
    location / {
        auth_request /_validate_session;
        error_page 401 = @login_redirect;

        proxy_pass http://fiscoprev_frontend;
        proxy_http_version 1.1;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTML: sempre revalidar (não cachear)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # API: proxy direto, sem cache, timeout maior para uploads — Protegido por SSO
    location /api/ {
        auth_request /_validate_session;
        error_page 401 = @login_redirect;

        proxy_pass http://fiscoprev_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts maiores para upload de Excel
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # JS/CSS do Vite: cache com revalidação (hash no filename garante invalidação)
    location ~* \.(js|css)$ {
        proxy_pass http://fiscoprev_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Imagens e fontes: cache longo
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://fiscoprev_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check — SEM auth_request (monitoramento)
    location /health {
        proxy_pass http://fiscoprev_frontend/api/health;
        access_log off;
    }
}

# ============================================
# REDIRECIONAMENTO HTTP → HTTPS
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name fiscoprev.canellahub.com.br;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}