# Bloco para o Certbot (HTTP)
server {
    listen 80;
    server_name contask.canellahub.com.br;

    # ESTA É A CORREÇÃO para renovação automática (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Bloco principal do Contask (HTTPS)
server {
    listen 443 ssl http2;
    server_name contask.canellahub.com.br;

    # Usaremos o certificado do 'contask' para ambos os domínios
    ssl_certificate /etc/letsencrypt/live/contask.canellahub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/contask.canellahub.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # === SSO: Validação de Sessão via CanellaHub ===
    location = /_validate_session {
        internal;
        proxy_pass http://task_manager_backend:3001/api/auth/validate-session;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location @login_redirect {
        return 302 https://canellahub.com.br?redirect=$scheme://$host$request_uri;
    }

    # Página de manutenção quando o backend está fora do ar
    error_page 502 503 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # SSO Login — NÃO requer auth_request (é a landing page de SSO)
    location /sso-login {
        proxy_pass http://task_manager_frontend:80/sso-login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reset de senha — NÃO requer auth_request (ação pré-autenticação)
    location /reset-password {
        proxy_pass http://task_manager_frontend:80/reset-password;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Verificação de email — NÃO requer auth_request (ação pré-autenticação)
    location /verify-email {
        proxy_pass http://task_manager_frontend:80/verify-email;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets estáticos (JS/CSS/imagens) — NÃO requer auth_request (necessário para páginas públicas)
    location /assets/ {
        proxy_pass http://task_manager_frontend:80/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API — NÃO requer auth_request (usa Bearer token próprio)
    location /api {
        proxy_pass http://task_manager_backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend — Protegido por SSO
    location / {
        auth_request /_validate_session;
        error_page 401 = @login_redirect;

        proxy_pass http://task_manager_frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
