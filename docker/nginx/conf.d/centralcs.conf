# ============================================
# CANELLAVIEW - CENTRAL C&S - SISTEMA DE GESTÃO
# ============================================
# Arquivo: centralcs.conf
# Container: canellaview_app (monolítico, porta 5000)

# ============================================
# SERVIDOR HTTPS
# ============================================
server {
    listen 443 ssl;
    server_name canellaview.canellahub.com.br;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/canellaview.canellahub.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/canellaview.canellahub.com.br/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upload size
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/canellaview_access.log;
    error_log /var/log/nginx/canellaview_error.log warn;

    # ============================================
    # HEADERS DE SEGURANÇA
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================
    # SSO: Validação de Sessão via CanellaHub
    # ============================================
    location = /_validate_session {
        internal;
        proxy_pass http://task_manager_backend:3001/api/auth/validate-session;
        proxy_method GET;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Content-Type "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location @login_redirect {
        return 302 https://canellahub.com.br?redirect=$scheme://$host$request_uri;
    }

    # Página de manutenção quando o backend de autenticação está fora do ar
    error_page 502 503 /maintenance.html;
    location = /maintenance.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Assets estáticos — SEM auth_request (necessário para páginas públicas)
    location /assets/ {
        proxy_pass http://canellaview_app:5000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # API BACKEND
    # SEM auth_request — protegido indiretamente (página exige SSO para carregar)
    # ============================================
    location /api/ {
        proxy_pass http://canellaview_app:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ============================================
    # FRONTEND (SPA) — Protegido por SSO
    # ============================================
    location / {
        auth_request /_validate_session;
        error_page 401 = @login_redirect;

        proxy_pass http://canellaview_app:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTML: sempre revalidar
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Health check — SEM auth_request (monitoramento)
    location /health {
        proxy_pass http://canellaview_app:5000/api/health;
        access_log off;
    }
}

# ============================================
# REDIRECIONAMENTO HTTP → HTTPS
# ============================================
server {
    listen 80;
    server_name canellaview.canellahub.com.br;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
